# ─────────────────────────────────────────────────────────────────────────────
# docker-publish.yml — Build & push image CPU sur GitHub Container Registry
# ─────────────────────────────────────────────────────────────────────────────
# Déclencheurs :
#   - Push sur main (tag :latest)
#   - Tag v* (tag :v1.0.0 + :latest)
#   - Manuellement (workflow_dispatch)
#
# L'image CUDA n'est PAS publiée ici (build flash-attn ~1h, dépasse les
# limites des runners GitHub Actions). Voir Dockerfile.cuda pour build local.
# ─────────────────────────────────────────────────────────────────────────────

name: Docker — Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── GHCR login ──────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata (tags + labels) ────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Sur push main → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Sur tag v1.2.3 → :v1.2.3
            type=semver,pattern={{version}}
            # Sur tag v1.2.3 → :v1.2
            type=semver,pattern={{major}}.{{minor}}
            # SHA court pour traçabilité
            type=sha,prefix=

      # ── Build cache setup ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
