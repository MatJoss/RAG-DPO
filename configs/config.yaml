# Configuration principale
scraping:
  base_url: "https://www.cnil.fr/fr/professionnel"
  allowed_domains:
    - "www.cnil.fr"
  file_types:
    - html
    - pdf
    - odt
    - xlsx
    - docx
  max_depth: 5
  respect_robots_txt: true

processing:
  chunk_size: 512
  chunk_overlap: 128
  min_chunk_size: 100
  languages:
    - fr

embeddings:
  model: "BAAI/bge-m3"           # sentence-transformers, 1024 dims, multilingual
  dims: 1024                      # Dimensions des embeddings
  device: "cuda"                  # GPU (FP16, ~1.07 GB VRAM)
  batch_size: 64                  # Batch size pour encoding
  # Legacy (conservé pour référence)
  # model_local: "nomic-embed-text"  # Ancien: Ollama, 768 dims, anglais seul
  # model_hybrid: "mistral-embed"
  
llm:
  local:
    model: "mistral-nemo"  # 12B, excellent FR, 128K context
    temperature: 0.0       # Factuel strict
    max_tokens: 4096
  hybrid:
    provider: "mistral"
    model: "mistral-small-latest"
    temperature: 0.1
    max_tokens: 4096

enterprise:
  # Registre des tags : voir configs/enterprise_tags.json (MAJ auto à chaque ingestion)
  # default_tags : tags toujours inclus dans la recherche (même si non sélectionnés)
  # active_tags : tags réellement indexés (calculé automatiquement)
  # labels : noms affichés dans l'UI (personnalisable)

rag:
  # Retrieval
  n_documents: 5
  n_chunks_per_doc: 3
  max_context_length: 32000   # ~8000 tokens

  # Recherche hybride
  enable_hybrid: true           # BM25 sparse + semantic dense + RRF
  enable_summary_prefilter: true
  summary_prefilter_k: 40      # Top-N documents du pré-filtre (augmenté: les bons docs étaient hors top-20)

  # Query expansion (multi-query retrieval)
  enable_query_expansion: true  # LLM reformule la question en 3 variantes
  query_expansion_n: 3          # Nombre de reformulations
  query_expansion_temperature: 0.7  # Diversité des reformulations

  # Cross-encoder reranking
  enable_reranker: true
  reranker_model: "jinaai/jina-reranker-v2-base-multilingual"  # 278M, MIRACL FR 54.83, 7× plus rapide que BGE
  reranker_device: "cpu"        # CPU pour ne pas toucher au VRAM
  rerank_candidates: 40         # Candidats bruts (semantic+BM25) passés au reranker AVANT dédup document
  rerank_top_k: 10              # Chunks gardés après reranking

  # Validation
  enable_validation: true
  relevance_threshold: 0.80      # Calibré pour bge-reranker-v2-m3 (scores 0-1, pertinent ~0.2-0.8)
  
  # Expert refinement (reformulation DPO senior post-génération)
  enable_expert_refinement: false  # Coût: +1 appel LLM (~30-45s), qualité perçue ↑ mais score eval ≈

  # Génération
  temperature: 0.0              # Factuel strict

# ── Observabilité ──────────────────────────────────────────
observability:
  logging:
    level: INFO                    # DEBUG, INFO, WARNING, ERROR
    structured_file: "app.jsonl"   # JSON structured logs
    max_size_mb: 20                # Rotation après N MB
    console: true                  # Logs human-readable en console

  alerting:
    enabled: true
    check_interval_minutes: 60     # Fréquence de vérification (en minutes)

    thresholds:
      error_rate_pct: 20.0         # Alerte si taux d'erreur > N%
      avg_response_time_s: 60.0    # Alerte si temps moyen > Ns
      satisfaction_below_pct: 50.0 # Alerte si satisfaction < N%
      zero_citation_rate_pct: 30.0 # Alerte si taux questions sans citation > N%

    # Configuration SMTP pour alertes email (désactivé par défaut)
    # Configurez ces champs pour activer les notifications email
    smtp:
      enabled: false
      host: ""                     # Ex: smtp.gmail.com
      port: 587
      use_tls: true
      username: ""                 # Adresse email d'envoi
      password: ""                 # Mot de passe ou app password
      from_addr: ""                # Adresse expéditeur
      to_addrs: []                 # Liste des destinataires
      # Exemple :
      # host: "smtp.gmail.com"
      # port: 587
      # username: "mon-dpo-bot@gmail.com"
      # password: "xxxx-xxxx-xxxx-xxxx"
      # from_addr: "mon-dpo-bot@gmail.com"
      # to_addrs:
      #   - "dpo@entreprise.com"
      #   - "admin@entreprise.com"
